# --- 網路設定 ---
# 在 Docker 中，我們必須綁定到 0.0.0.0，否則外部（主機）連不進來
bind 0.0.0.0
port 6379

# --- 安全性 ---
# 設定連線密碼 (請務必修改)
# requirepass 

# --- 持久化 (Persistence) ---
# 開啟 AOF 模式（每秒記錄一次寫入操作），防止丟失資料
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

# RDB 快照設定（例如 900 秒內有 1 個 key 變動則存檔）
save 900 1
save 300 10

# --- 效能與限制 ---
# 當記憶體達到上限時，優先刪除設定了過期時間且最少使用的 key
maxmemory 512mb
maxmemory-policy allkeys-lru

# --- 日誌 ---
loglevel notice